services:

  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
    - ./server:/server
    - backend_node_modules:/server/node_modules
    env_file:
    - ./server/.env
    command: npm run dev

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/client
      - frontend_node_modules:/client/node_modules

    command: npm run dev

volumes:
  backend_node_modules:
  frontend_node_modules:
